name: BQ-AI Trends Auto Scraper

on:
  schedule:
    # 3시간마다 :17분에 실행 (하루 8회: 00:17, 03:17, 06:17 ... 21:17 KST 기준)
    # 정각 혼잡 회피 + 기존 매시간 대비 스캔량 1/3로 절감
    - cron: '17 */3 * * *'
  # 수동 실행 가능하도록 설정
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Create Google Credentials File
        # GitHub Secret에 저장된 JSON 내용을 실제 파일로 생성합니다.
        run: |
          echo "$GCP_CREDENTIALS_JSON" > gcp_service_account.json
        env:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS }}

      - name: Execute BQ & AI Pipeline
        # 환경 변수에 만들어진 파일 경로와 Gemini API 키를 주입하여 실행합니다.
        run: |
          echo "Running BQ Fetcher & AI Summarizer Task..."
          python fetcher.py
        env:
          GOOGLE_APPLICATION_CREDENTIALS: "gcp_service_account.json"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Clean up Credentials
        # 보안을 위해 사용이 끝난 서비스 계정 키 파일은 즉시 삭제합니다.
        if: always()
        run: rm -f gcp_service_account.json
          
      - name: Commit and Push Data Updates
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "BQ-AI: Auto-update trends data & usage tracker [skip ci]" || echo "No changes to commit"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done

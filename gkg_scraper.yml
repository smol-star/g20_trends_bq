name: BQ-GKG Lifestyle & Subculture Scraper

on:
  schedule:
    # 매주 월요일, 목요일 00:00 UTC (KST 09:00 AM)
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape_and_process_gkg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Create Google Credentials File
        run: |
          echo "$GCP_CREDENTIALS_JSON" > gcp_service_account.json
        env:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS }}

      - name: Execute GKG Fetcher & AI Summarizer Task
        run: |
          echo "Running GKG Fetcher Task..."
          python fetcher_gkg.py
        env:
          GOOGLE_APPLICATION_CREDENTIALS: "gcp_service_account.json"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Clean up Credentials
        if: always()
        run: rm -f gcp_service_account.json
          
      - name: Commit and Push Data Updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "BQ-GKG: Auto-update Lifestyle & Subculture trends [skip ci]" || echo "No changes to commit"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
